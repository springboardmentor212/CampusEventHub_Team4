version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: campuseventhub-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: campuseventhub-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=docker

  frontend:
    build: ./frontend
    container_name: campuseventhub-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
